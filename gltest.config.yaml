# gltest.config.yaml
# Configuration for GenLayer Test Framework

networks:
  testnet_bradbury:
    # No need to specify url - it's pre-configured[citation:3]
    accounts:
      - "${BRADBURY_PRIVATE_KEY_1}"
      - "${BRADBURY_PRIVATE_KEY_2}"
      - "${BRADBURY_PRIVATE_KEY_3}"
    from: "${BRADBURY_PRIVATE_KEY_1}"  # Optional: default account
  
  studionet:
    # Pre-configured - no accounts needed
    pass

  localnet:
    # Pre-configured - auto-generates accounts
    pass

# Set Bradbury as default
default_network: testnet_bradbury

# Keep your existing settings
test:
  timeout: 120000
  retries: 3
  wait_interval: 5000

logging:
  level: info
  format: pretty
  output: stdout

direct_mode:
  strict_mocks: true
  check_pickling: true